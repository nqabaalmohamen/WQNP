<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نقابة المحامين بالفيوم</title>
    <script>
        // فحص فوري قبل تحميل أي شيء
        function checkConnectivity() {
            if (!navigator.onLine) {
                document.documentElement.innerHTML = `
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body { 
                            margin: 0; 
                            background: #0f172a; 
                            color: white; 
                            font-family: sans-serif; 
                            display: flex; 
                            flex-direction: column; 
                            align-items: center; 
                            justify-content: center; 
                            height: 100vh; 
                            text-align: center; 
                            direction: rtl;
                        }
                        .icon { font-size: 64px; margin-bottom: 20px; color: #ef4444; }
                        h1 { font-size: 24px; margin-bottom: 10px; }
                        p { color: #94a3b8; max-width: 300px; line-height: 1.6; }
                        button { 
                            margin-top: 20px; 
                            padding: 12px 24px; 
                            background: #2563eb; 
                            color: white; 
                            border: none; 
                            border-radius: 12px; 
                            font-weight: bold; 
                            cursor: pointer; 
                        }
                    </style>
                </head>
                <body>
                    <div class="icon">⚠️</div>
                    <h1>لا يوجد اتصال بالإنترنت</h1>
                    <p>عذراً، هذا النظام يعمل عبر الإنترنت فقط لحماية وتأمين البيانات. يرجى الاتصال بالشبكة والمحاولة مرة أخرى.</p>
                    <button onclick="window.location.reload()">إعادة المحاولة</button>
                </body>`;
                return false;
            }
            return true;
        }

        // تنفيذ الفحص فوراً
        checkConnectivity();

        // إضافة مستمع لتغير الحالة
        window.addEventListener('offline', function() {
            window.location.reload();
        });
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
