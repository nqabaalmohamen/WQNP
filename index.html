<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نقابة المحامين بالفيوم</title>
    <script>
        // فحص حقيقي للاتصال بالإنترنت عبر محاولة الوصول لخدمة سحابية
        async function checkRealConnectivity() {
            if (!navigator.onLine) {
                showOfflineScreen();
                return false;
            }
            try {
                // محاولة الاتصال بـ Supabase للتأكد من وجود إنترنت حقيقي
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch('https://ayxmuvfbhleijlynsdbv.supabase.co/rest/v1/', {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return true;
            } catch (e) {
                showOfflineScreen();
                return false;
            }
        }

        function showOfflineScreen() {
            // تنبيه المستخدم فوراً برسالة منبثقة كما طلب
            if (!window.isAlerted) {
                alert("تنبيه: أنت غير متصل بالإنترنت. النظام يتطلب اتصالاً نشطاً للعمل.");
                window.isAlerted = true;
            }

            document.documentElement.innerHTML = `
            <head>
                <meta charset="UTF-8">
                <style>
                    body { 
                        margin: 0; 
                        background: #0f172a; 
                        color: white; 
                        font-family: sans-serif; 
                        display: flex; 
                        flex-direction: column; 
                        align-items: center; 
                        justify-content: center; 
                        height: 100vh; 
                        text-align: center; 
                        direction: rtl;
                    }
                    .icon { font-size: 80px; margin-bottom: 24px; color: #ef4444; animation: pulse 2s infinite; }
                    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
                    h1 { font-size: 32px; margin-bottom: 16px; font-weight: 900; }
                    p { color: #94a3b8; max-width: 400px; line-height: 1.8; font-size: 18px; margin-bottom: 32px; }
                    button { 
                        padding: 16px 40px; 
                        background: #2563eb; 
                        color: white; 
                        border: none; 
                        border-radius: 16px; 
                        font-weight: bold; 
                        font-size: 18px;
                        cursor: pointer; 
                        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
                        transition: all 0.2s;
                    }
                    button:hover { background: #1d4ed8; transform: translateY(-2px); }
                </style>
            </head>
            <body>
                <div class="icon">🚫</div>
                <h1>تنبيه أمني: لا يوجد إنترنت</h1>
                <p>عذراً، لا يمكن الدخول إلى أي جزء من النظام دون اتصال نشط بالإنترنت لحماية وتأمين بيانات نقابة المحامين.</p>
                <button onclick="window.location.reload()">إعادة المحاولة الآن</button>
            </body>`;
        }

        // فحص أولي
        checkRealConnectivity();

        // فحص دوري كل 5 ثواني للتأكد من استمرار الإنترنت
        setInterval(checkRealConnectivity, 5000);

        // مراقبة أحداث المتصفح
        window.addEventListener('offline', () => {
            window.isAlerted = false;
            checkRealConnectivity();
        });
        window.addEventListener('online', () => {
            window.isAlerted = false;
            window.location.reload();
        });
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
